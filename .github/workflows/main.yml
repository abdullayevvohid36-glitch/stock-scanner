name: Stock Swing Email Scanner
on:
  schedule:
    - cron: '0 16 * * 1-5'
  workflow_dispatch:
jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      # ← QO'SHILDI: Debug tekshirish
      - name: Debug secrets va fayl
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          echo "EMAIL_USER uzunligi: ${#EMAIL_USER}"
          echo "EMAIL_PASS uzunligi: ${#EMAIL_PASS}"
          echo "RECEIVER_EMAIL uzunligi: ${#RECEIVER_EMAIL}"
          echo "scanner.py mavjudmi:"
          ls -la scanner.py || echo "scanner.py TOPILMADI!"
          echo "Repo tarkibi:"
          ls -la

      - name: Run Scanner
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python scanner.py
