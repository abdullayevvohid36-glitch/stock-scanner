name: Daily Swing Scanner

on:
  schedule:
    # UTC vaqti bilan har kuni soat 01:00 da (O'zbekistonda soat 06:00 bo'ladi)
    - cron: '0 1 * * *'
  workflow_dispatch: # Istalgan payt qo'lda ham ishga tushirish tugmasi

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python-ni sozlash
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kutubxonalarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Skriptni ishga tushirish
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python scanner.py
